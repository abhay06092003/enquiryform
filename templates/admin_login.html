<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Quick Platter</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Roboto', Arial, sans-serif;
      background: #f0ebf8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 1px 2px rgba(60,64,67,.3), 0 1px 3px 1px rgba(60,64,67,.15);
      border-top: 10px solid #673ab7;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
    }
    h1 { font-size: 24px; font-weight: 400; margin-bottom: 8px; color: #202124; }
    p { color: #5f6368; font-size: 14px; margin-bottom: 28px; }
    label { display: block; font-size: 14px; color: #202124; margin-bottom: 8px; }
    input[type="password"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: 14px;
      outline: none;
      margin-bottom: 20px;
    }
    input[type="password"]:focus { border-color: #673ab7; }
    .btn {
      width: 100%;
      padding: 12px;
      background: #673ab7;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn:hover { background: #512da8; }
    .error {
      background: #fce8e6;
      color: #d93025;
      padding: 10px 14px;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #673ab7;
      text-decoration: none;
      font-size: 14px;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>Admin Access</h1>
    <p>Enter password to view submissions</p>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter admin password" required autofocus>
      <button type="submit" class="btn">Sign In</button>
    </form>
    <a href="/" class="back-link">← Back to form</a>
  </div>
</body>
</html>
